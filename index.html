<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người thương ❤️ Happy Birthday</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --rose:    #f9a8d4;
            --violet:  #c084fc;
            --gold:    #fde68a;
            --deep:    #050510;
            --mid:     #100b1a;
            --glow-r:  rgba(249,168,212,0.25);
            --glow-v:  rgba(192,132,252,0.25);
            --ff:      'Dancing Script', cursive;
            --fs:      'Cormorant Garamond', serif;
            --fb:      'Montserrat', sans-serif;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; cursor:none; }
        html, body { width:100%; height:100%; overflow:hidden; background:var(--deep); color:#fff; font-family:var(--fb); }

        /* ═══ CURSOR ═══ */
        #cur { position:fixed; width:12px; height:12px; background:#fff; border-radius:50%; pointer-events:none; z-index:9999; mix-blend-mode:difference; }
        #cur2 { position:fixed; width:36px; height:36px; border:1px solid var(--rose); border-radius:50%; pointer-events:none; z-index:9998; background:rgba(249,168,212,0.07); transition:transform .15s; }

        /* ═══ LOADER ═══ */
        #loader {
            position:fixed; inset:0; z-index:10000;
            display:flex; flex-direction:column; gap:2rem; justify-content:center; align-items:center;
            background:var(--deep);
        }
        .loader-ring {
            width:70px; height:70px; border-radius:50%;
            border:1px solid transparent;
            border-top-color:var(--rose);
            border-right-color:var(--violet);
            animation:spin 1.4s linear infinite;
        }
        .loader-ring::before {
            content:''; position:absolute; inset:6px; border-radius:50%;
            border:1px solid transparent;
            border-bottom-color:var(--gold);
            animation:spin 0.9s linear infinite reverse;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ═══ NOISE GRAIN overlay ═══ */
        body::after {
            content:''; position:fixed; inset:0; z-index:9997; pointer-events:none; opacity:.035;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size:120px; animation:grain 0.6s steps(1) infinite;
        }
        @keyframes grain { 0%{transform:translate(0,0)} 10%{transform:translate(-2%,-2%)} 30%{transform:translate(2%,-1%)} 50%{transform:translate(-1%,2%)} 70%{transform:translate(1%,1%)} 90%{transform:translate(-2%,1%)} }

        /* ═══ SCREENS ═══ */
        .screen {
            position:absolute; inset:0;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            opacity:0; visibility:hidden; perspective:1800px;
            transition:opacity 1.4s cubic-bezier(.19,1,.22,1), visibility 1.4s;
        }
        .screen.active { opacity:1; visibility:visible; }

        /* ═══ GALAXY BACKGROUND ═══ */
        #galaxy-bg { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-10; background:radial-gradient(ellipse at bottom, #1b2735 0%, var(--deep) 100%); overflow:hidden; }
        .stars, .stars2, .stars3 { position:absolute; top:0; left:0; background:transparent; }
        .stars { width:1px; height:1px; animation:animStar 150s linear infinite; box-shadow:var(--shadow-sm); }
        .stars2 { width:2px; height:2px; animation:animStar 200s linear infinite; box-shadow:var(--shadow-md); }
        .stars3 { width:3px; height:3px; animation:animStar 300s linear infinite; box-shadow:var(--shadow-lg); }
        .stars::after, .stars2::after, .stars3::after { content:" "; position:absolute; top:100vh; background:transparent; }
        .stars::after { width:1px; height:1px; box-shadow:var(--shadow-sm); }
        .stars2::after { width:2px; height:2px; box-shadow:var(--shadow-md); }
        .stars3::after { width:3px; height:3px; box-shadow:var(--shadow-lg); }
        @keyframes animStar { from { transform:translateY(0px); } to { transform:translateY(-100vh); } }

        /* ═══ MÀN 1 — INTRO ═══ */
        #s1 { background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(26,10,46,0.5) 0%, transparent 100%); }
        #s1-canvas { position:absolute; inset:0; z-index:0; }
        .s1-content { position:relative; z-index:2; text-align:center; overflow: visible; }
        .s1-sub { font-family:var(--fb); font-weight:200; letter-spacing:.6em; font-size:.75rem; color:rgba(255,255,255,.5); text-transform:uppercase; margin-bottom:1.2rem; }
        .s1-dear { font-family:var(--ff); font-size:3.5rem; color:var(--rose); opacity:.8; }
        .s1-name-wrap { filter:drop-shadow(0 0 30px rgba(253,230,138,.3)); }
        .s1-name { 
            font-family:var(--ff); font-size:7rem; line-height:1.3; 
            background:linear-gradient(135deg, var(--gold) 0%, var(--rose) 60%, var(--violet) 100%); 
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; 
            padding: 20px 60px; margin: 0;
            display: inline-block;
            will-change: transform;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            overflow: visible;
        }
        .s1-divider { width:120px; height:1px; background:linear-gradient(90deg, transparent, var(--rose), transparent); margin:2rem auto; }

        /* ═══ BTN ═══ */
        .btn {
            padding:16px 52px; border:none; border-radius:100px;
            background:linear-gradient(135deg, rgba(192,132,252,.15), rgba(249,168,212,.15));
            border:1px solid rgba(249,168,212,.3); color:#fff;
            font-family:var(--fb); font-weight:300; font-size:.8rem; letter-spacing:.35em; text-transform:uppercase;
            backdrop-filter:blur(10px); cursor:none; transition:all .4s;
            box-shadow:0 0 40px rgba(192,132,252,.1), inset 0 0 30px rgba(249,168,212,.05);
        }
        .btn:hover { border-color:rgba(249,168,212,.8); box-shadow:0 0 60px rgba(192,132,252,.3), inset 0 0 30px rgba(249,168,212,.1); transform:translateY(-3px); }

        /* ═══ MÀN 2 — PHONG BÌ ═══ */
        #s2 { background:radial-gradient(ellipse at 30% 60%, rgba(192,132,252,.04) 0%, transparent 60%), radial-gradient(ellipse at 70% 30%, rgba(249,168,212,.03) 0%, transparent 60%); }
        .env-wrap {
            width:460px; max-width:90vw;
            filter:drop-shadow(0 40px 80px rgba(0,0,0,.8));
            transform-style:preserve-3d; cursor:none;
        }
        .env-body {
            width:100%; height:300px; position:relative;
            background:linear-gradient(160deg, #2a1a3e 0%, #1e0f30 100%);
            border:1px solid rgba(249,168,212,.2);
            border-radius:4px 4px 6px 6px;
            overflow:visible;
        }
        .env-bottom { position:absolute; bottom:0; left:0; width:100%; height:100%; clip-path:polygon(0 40%, 50% 75%, 100% 40%, 100% 100%, 0 100%); background:linear-gradient(180deg, #231330 0%, #160b24 100%); border-radius:0 0 6px 6px; z-index:5; }
        .env-left  { position:absolute; bottom:0; left:0; width:100%; height:100%; clip-path:polygon(0 0, 0 100%, 50% 75%); background:linear-gradient(135deg, #1d0e2e 0%, #15091f 100%); z-index:6; }
        .env-right { position:absolute; bottom:0; right:0; width:100%; height:100%; clip-path:polygon(100% 0, 100% 100%, 50% 75%); background:linear-gradient(225deg, #1d0e2e 0%, #15091f 100%); z-index:6; }
        .env-flap {
            position:absolute; top:0; left:0; width:100%; height:55%;
            clip-path:polygon(0 0, 100% 0, 50% 100%);
            background:linear-gradient(180deg, #2d1b47 0%, #1e0f30 100%);
            transform-origin:top center; transform-style:preserve-3d;
            transition:transform 1s cubic-bezier(.19,1,.22,1); z-index:5;
            border-top:1px solid rgba(249,168,212,.2);
        }
        .env-seal {
            position:absolute; top:40%; left:50%; transform:translate(-50%, -50%);
            width:54px; height:54px; border-radius:50%;
            background:radial-gradient(circle, #c084fc 0%, #7c3aed 100%);
            box-shadow:0 0 30px rgba(192,132,252,.6), 0 0 60px rgba(192,132,252,.2);
            z-index:7; display:flex; align-items:center; justify-content:center;
            font-size:22px; transition:all .6s; border:2px solid rgba(255,255,255,.2);
        }
        .env-wrap.open .env-flap { transform:rotateX(-175deg); }
        .env-wrap.open .env-seal { opacity:0; transform:translate(-50%,-80%) scale(0.3); }

        .letter-card {
            position:absolute; bottom:10px; left:10px; width:calc(100% - 20px);
            background:rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            color:#2d1b40; padding:40px;
            border-radius:12px; z-index:2;
            box-shadow:0 10px 50px rgba(0,0,0,0.3);
            transition: all 1.2s cubic-bezier(.19,1,.22,1);
            height:280px; overflow-y:auto; scrollbar-width: none;
            opacity: 1; transform: translateY(0) scale(0.95);
        }
        .letter-card::-webkit-scrollbar { display: none; }
        
        /* Focus Mode when open */
        .env-wrap.open { opacity: 0.4; pointer-events: none; }
        .env-wrap.open .letter-card { 
            position: fixed;
            top: 50%; left: 50%;
            bottom: auto;
            width: 580px; max-width: 90vw;
            height: 70vh;
            transform: translate(-50%, -50%) scale(1);
            z-index: 100;
            box-shadow: 0 30px 120px rgba(0,0,0,0.6), 0 0 60px rgba(192,132,252,0.4);
            pointer-events: auto;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #btn-next {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            transition: all 0.6s cubic-bezier(.19,1,.22,1);
        }

        .letter-card h3 { font-family:var(--ff); font-size:2.8rem; color:#7c3aed; margin-bottom:1.5rem; text-align:center; width: 100%; }
        .letter-card p { font-family:var(--fs); font-size:1.3rem; line-height:1.8; color:#2d1b40; font-weight:400; white-space: pre-wrap; text-align: center; }
        .letter-border { position:absolute; left:0; top:0; bottom:0; width:5px; background:linear-gradient(180deg, var(--violet), var(--rose)); border-radius:12px 0 0 12px; }

        /* Cleaned up duplicate rule */
        .letter-card::after { content:''; position:absolute; inset:-2px; border-radius:3px; background:linear-gradient(45deg, var(--rose), var(--violet), var(--gold)); z-index:-1; opacity:0.3; filter:blur(15px); animation: auraPulse 3s infinite alternate; }
        @keyframes auraPulse { from { opacity:0.2; filter:blur(10px); } to { opacity:0.5; filter:blur(25px); } }

        /* ═══ MÀN 3 — CAKE ═══ */
        #s3 { background:radial-gradient(ellipse at 50% 80%, rgba(249,168,212,.04) 0%, transparent 70%); }
        #s3-canvas { position:absolute; inset:0; z-index:0; }
        .cake-ui { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:0.5rem; margin-top: 2rem; }
        .cake-label { font-family:var(--fb); font-weight:200; letter-spacing:.5em; font-size:.7rem; color:rgba(255,255,255,.5); text-transform:uppercase; margin-bottom: 0.5rem; }
        #cake-container { width: 100%; height: 650px; display: flex; justify-content: center; align-items: center; cursor: none; }

        /* ═══ MÀN 4 — SLIDESHOW ═══ */
        #s4 {
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            padding-bottom: 90px; /* space for fixed lyrics */
            user-select: none;
        }
        body.on-gallery #cur, body.on-gallery #cur2 { opacity: 0 !important; pointer-events: none; }

        #gallery-header {
            padding: 18px 0 4px;
            text-align: center;
            z-index: 10;
            flex-shrink: 0;
        }
        #gallery-header h2 {
            font-family: var(--ff);
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.45em;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            margin: 0;
        }
        #gallery-header p {
            font-family: var(--fb);
            font-size: 0.5rem;
            letter-spacing: 0.55em;
            color: rgba(249,168,212,0.45);
            margin: 5px 0 0;
            text-transform: uppercase;
        }

        #slideshow-wrap {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 0; /* critical for flex shrink */
        }
        #slide-track {
            display: flex;
            width: 100%;
            height: 100%;
            will-change: transform;
            cursor: grab;
            align-items: center;
        }
        #slide-track.dragging { cursor: grabbing; }
        .slide-item {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            box-sizing: border-box;
        }
        .polaroid-card {
            background: #fdfbff;
            border-radius: 6px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            padding: 10px 10px 44px 10px;
            max-width: min(280px, 76vw);
            width: 100%;
            text-align: center;
            transform-origin: center;
            transform: scale(0.88);
            transition: box-shadow 0.4s ease;
            will-change: transform;
        }
        .polaroid-card.active-card {
            transform: scale(1);
            box-shadow: 0 24px 80px rgba(192,132,252,0.45), 0 0 0 1px rgba(255,255,255,0.08);
        }
        .polaroid-photo {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: linear-gradient(135deg, #e9d5ff 0%, #fce7f3 100%);
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
        }
        .polaroid-photo img { width:100%; height:100%; object-fit:cover; display:block; }
        .polaroid-label {
            margin-top: 8px;
            font-family: var(--fb);
            font-weight: 300;
            font-size: 0.55rem;
            letter-spacing: 0.4em;
            color: #7c3aed;
            text-transform: uppercase;
        }
        .polaroid-note {
            margin-top: 6px;
            font-family: 'Dancing Script', 'Segoe Script', cursive;
            font-size: 0.85rem;
            color: #4c1d95;
            font-style: italic;
            line-height: 1.4;
            padding: 0 4px;
        }
        /* Tap hint on photo */
        .polaroid-photo { cursor: zoom-in; }

        /* ═══ LIGHTBOX ═══ */
        #lightbox {
            position: fixed; inset: 0;
            z-index: 9500;
            background: rgba(5,2,15,0.96);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #lightbox.open {
            opacity: 1; pointer-events: all;
        }
        #lb-img {
            max-width: 96vw;
            max-height: 72vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.8);
            transform: scale(0.92);
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            user-select: none;
            -webkit-user-drag: none;
        }
        #lightbox.open #lb-img { transform: scale(1); }
        #lb-caption {
            margin-top: 18px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.75);
            font-style: italic;
            text-align: center;
            max-width: 80vw;
        }
        #lb-counter {
            margin-top: 6px;
            font-family: var(--fb);
            font-size: 0.5rem;
            letter-spacing: 0.5em;
            color: rgba(255,255,255,0.3);
        }
        #lb-close {
            position: absolute; top: 18px; right: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 40px; height: 40px;
            color: #fff; font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
            z-index: 2;
        }
        #lb-close:hover { background: rgba(244,63,94,0.35); }
        #lb-prev, #lb-next {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.13);
            border-radius: 50%;
            width: 44px; height: 44px;
            color: #fff; font-size: 1.1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, transform 0.15s;
            z-index: 2;
        }
        #lb-prev { left: 12px; }
        #lb-next { right: 12px; }
        #lb-prev:hover, #lb-next:hover { background: rgba(192,132,252,0.3); }
        #lb-prev:active, #lb-next:active { transform: translateY(-50%) scale(0.88); }

        /* ═══ APP FULLSCREEN BUTTON ═══ */
        #btn-fullscreen {
            position: fixed; top: 16px; right: 16px;
            z-index: 9000;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 100px;
            padding: 6px 12px;
            color: rgba(255,255,255,0.55);
            font-family: var(--fb);
            font-size: 0.55rem;
            letter-spacing: 0.25em;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: background 0.25s, color 0.25s;
            display: flex; align-items: center; gap: 5px;
        }
        #btn-fullscreen:hover { background: rgba(192,132,252,0.2); color: #fff; }
        #btn-fullscreen svg { width: 13px; height: 13px; flex-shrink: 0; }

        #slide-nav {
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 10;
            padding: 10px 0 4px;
            flex-shrink: 0;
        }
        #slide-prev, #slide-next {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 38px; height: 38px;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: background 0.25s, transform 0.15s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        #slide-prev:active, #slide-next:active { transform: scale(0.88); }
        #slide-prev:hover, #slide-next:hover { background: rgba(192,132,252,0.28); }
        #slide-dots { display: flex; gap: 6px; align-items: center; }
        .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.22);
            transition: background 0.35s, width 0.35s, border-radius 0.35s;
            cursor: pointer;
        }
        .dot.active { background: var(--rose); width: 20px; border-radius: 3px; }
        #slide-counter {
            font-family: var(--fb);
            font-size: 0.52rem;
            letter-spacing: 0.4em;
            color: rgba(255,255,255,0.28);
            padding-bottom: 4px;
            flex-shrink: 0;
        }
        #lyrics-ui {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
            font-family:var(--ff); font-size:1.4rem; color:var(--gold);
            text-shadow:0 0 30px rgba(253,230,138,.5), 0 0 60px rgba(253,230,138,.2);
            pointer-events:none; z-index:200; white-space:nowrap;
            opacity:0; transition:opacity .6s;
            max-width: 90vw; overflow: hidden; text-overflow: ellipsis; text-align: center;
        }

        /* ═══ WEBCAM ═══ */
        #wcam {
            position:fixed; bottom:24px; left:24px;
            width:150px; height:112px; border-radius:14px; overflow:hidden;
            border:1px solid rgba(249,168,212,.3);
            box-shadow:0 10px 40px rgba(0,0,0,.6);
            display:none; z-index:500;
            backdrop-filter: blur(8px); background: rgba(0,0,0,0.2);
        }
        #wcam video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
        #wcam-label {
            position:absolute; bottom:0; left:0; right:0; padding:4px;
            background:linear-gradient(transparent, rgba(0,0,0,.7));
            font-size:.55rem; letter-spacing:.2em; text-align:center; color:var(--rose);
        }
        #wcam-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:#f43f5e; animation:blink 1.5s infinite; margin-right:4px; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

        /* ═══ FLOATING PETALS (màn 1) ═══ */
        .petal {
            position:absolute; pointer-events:none; z-index:1;
            font-size:16px; opacity:.6; user-select:none;
        }

        /* ═══ MODE BADGE ═══ */
        #mode-badge {
            position:fixed; top:20px; right:24px;
            font-size:.6rem; letter-spacing:.3em; padding:6px 14px;
            border:1px solid rgba(255,255,255,.1); border-radius:100px;
            color:rgba(255,255,255,.4); z-index:500; display:none;
        }

        @keyframes floatTitle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .s1-name { animation: floatTitle 4s ease-in-out infinite; }

let s1Scene, s1Camera, s1Renderer, s1Stars, s1Hearts = [], s1ExitMode = false;

function initS1Three() {
    const canvas = document.getElementById('s1-canvas');
    const W = window.innerWidth;
    const H = window.innerHeight;

    s1Scene = new THREE.Scene();
    s1Camera = new THREE.PerspectiveCamera(60, W/H, 1, 1000);
    s1Camera.position.z = 400;

    s1Renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
    s1Renderer.setSize(W, H);
    s1Renderer.setPixelRatio(window.devicePixelRatio);

    // Stars
    const starGeo = new THREE.BufferGeometry();
    const starCount = 1500;
    const starPos = new Float32Array(starCount * 3);
    for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random()-0.5) * 2000;
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    s1Stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.8 }));
    s1Scene.add(s1Stars);

    // Floating 3D Hearts
    const heartShape = new THREE.Shape();
    heartShape.moveTo(0, 0);
    heartShape.bezierCurveTo(0, -3, -5, -3, -5, 0);
    heartShape.bezierCurveTo(-5, 5, 0, 8, 0, 12);
    heartShape.bezierCurveTo(0, 8, 5, 5, 5, 0);
    heartShape.bezierCurveTo(5, -3, 0, -3, 0, 0);

    const heartGeo = new THREE.ExtrudeGeometry(heartShape, { depth: 2, bevelEnabled: true, bevelThickness: 1, bevelSize: 1 });
    const heartMat = new THREE.MeshStandardMaterial({ color: 0xf472b6, roughness: 0.4, metalness: 0.2 });

    for(let i=0; i<20; i++) {
        const heart = new THREE.Mesh(heartGeo, heartMat);
        heart.position.set((Math.random()-0.5)*800, (Math.random()-0.5)*600, (Math.random()-0.5)*400);
        heart.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
        heart.scale.set(1.5, 1.5, 1.5);
        s1Scene.add(heart);
        s1Hearts.push({
            mesh: heart,
            speed: 0.2 + Math.random()*0.5,
            rotSpeed: (Math.random()-0.5)*0.02
        });
    }

    const light = new THREE.PointLight(0xf9a8d4, 1000, 1000);
    light.position.set(0, 0, 200);
    s1Scene.add(light);
    s1Scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    animateS1();
    
    window.addEventListener('resize', () => {
        s1Camera.aspect = window.innerWidth / window.innerHeight;
        s1Camera.updateProjectionMatrix();
        s1Renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.triggerS1Exit = () => { s1ExitMode = true; };
}

function animateS1() {
    if(appState !== 1 && !s1ExitMode) return;
    requestAnimationFrame(animateS1);

    s1Stars.rotation.z += 0.0005;
    
    s1Hearts.forEach(h => {
        h.mesh.position.y += h.speed;
        h.mesh.rotation.x += h.rotSpeed;
        h.mesh.rotation.y += h.rotSpeed;
        if(h.mesh.position.y > 400) h.mesh.position.y = -400;
        
        if(s1ExitMode) {
            h.mesh.position.z += 20;
            h.mesh.scale.multiplyScalar(0.95);
        }
    });

    if(s1ExitMode) {
        s1Camera.position.z -= 10;
        s1Stars.material.opacity *= 0.95;
    }

    // Gentle parallax based on mouse
    s1Scene.rotation.y += (mouseX * 0.05 - s1Scene.rotation.y) * 0.05;
    s1Scene.rotation.x += (-mouseY * 0.05 - s1Scene.rotation.x) * 0.05;

    s1Renderer.render(s1Scene, s1Camera);
}

    pmremGenerator.compileEquirectangularShader();
    cakeScene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

    const renderScene = new RenderPass(cakeScene, cakeCamera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(width, height), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.85; // Only extremely bright spots bloom

    cakeGroup = new THREE.Group();

function createGiftBox() {

function createNecklace() {
    necklace = new THREE.Group();

    for (let i = 0; i < 4000; i++) {
        const v = Math.floor(Math.random() * 255);
        ctx.fillStyle = `rgb(${v},${v},${v})`;
        ctx.fillRect(Math.random()*256, Math.random()*256, Math.random()*4 + 1, Math.random()*4 + 1);
    }
    const facetTexture = new THREE.CanvasTexture(canvas);
    facetTexture.wrapS = THREE.RepeatWrapping;
    facetTexture.wrapT = THREE.RepeatWrapping;
    facetTexture.repeat.set(2, 2);

    const paveMat = new THREE.MeshPhysicalMaterial({ 
        color: 0xffffff, 
        metalness: 0.2, 
        roughness: 0.1,
        transmission: 0.0,
        clearcoat: 1.0,
        bumpMap: facetTexture,
        bumpScale: 0.015
    });

    const swanGroup = new THREE.Group();

    // Helper to draw tubes
    function createCurve(points) {
        const curve = new THREE.CatmullRomCurve3(points.map(p => new THREE.Vector3(p[0], p[1], 0)));
        const geo = new THREE.TubeGeometry(curve, 32, 0.05, 8, false);
        return new THREE.Mesh(geo, paveMat);
    }

    // Outer frame
    const bodyCurve = createCurve([
        [0.8, 0.6],   // Beak
        [0.6, 0.8],   // Top head
        [0.4, 0.7],   // Back head
        [0.45, 0.3],  // Neck
        [0.7, -0.1],  // Chest
        [0.5, -0.4],  // Bottom right
        [-0.3, -0.4], // Bottom left
        [-0.7, 0.1]   // Tail tip
    ]);
    swanGroup.add(bodyCurve);

    const wingTop = createCurve([
        [0.4, 0.4],   // Neck base
        [-0.2, 0.8],  // Wing top arch
        [-0.7, 0.1]   // Tail tip
    ]);
    swanGroup.add(wingTop);

    // Inner Feathers
    const feather1 = createCurve([
        [0.6, 0.0],
        [-0.1, 0.4],
        [-0.5, 0.2]
    ]);
    swanGroup.add(feather1);

    const feather2 = createCurve([
        [0.4, -0.2],
        [-0.1, 0.1],
        [-0.4, -0.1]
    ]);
    swanGroup.add(feather2);

    // Center Dancing Diamond
    const diamondGeo = new THREE.OctahedronGeometry(0.18, 1);
    const diamondMat = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        metalness: 0.1,
        roughness: 0.0,
        transmission: 1.0,
        ior: 2.4,
        thickness: 0.5
    });
    const centerDiamond = new THREE.Mesh(diamondGeo, diamondMat);
    centerDiamond.scale.set(1.5, 0.8, 0.5); // Marquise shape
    
    // Create a pivot group so the diamond can "dance"
    const dancingPivot = new THREE.Group();
    dancingPivot.position.set(0.1, 0.2, 0); // Hang from upper feather
    centerDiamond.position.set(0, -0.15, 0);
    dancingPivot.add(centerDiamond);
    dancingPivot.userData.isDancing = true; // Flag for animation
    
    swanGroup.add(dancingPivot);

    swanGroup.scale.set(0.7, 0.7, 0.7);
    swanGroup.position.set(-0.1, -0.3, 0);
    necklace.add(swanGroup);

    // Chains
    const chainMat = new THREE.MeshPhysicalMaterial({ 
        color: 0xffffff, 
        metalness: 1.0, 
        roughness: 0.1,
        clearcoat: 1.0
    });
    
    // Connects to wing tip (left)
    const leftChainCurve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(-0.49, -0.23, 0), // approx tip position
        new THREE.Vector3(-0.4, 0.5, -0.2),
        new THREE.Vector3(0, 3.0, -1.0)
    ]);
    const leftChain = new THREE.Mesh(new THREE.TubeGeometry(leftChainCurve, 64, 0.012, 6, false), chainMat);
    necklace.add(leftChain);

    // Connects to beak (right)

        new THREE.Vector3(0.46, 0.12, 0), // approx beak position
        new THREE.Vector3(0.4, 0.6, -0.2),
        new THREE.Vector3(0, 3.0, -1.0)
    ]);
    const rightChain = new THREE.Mesh(new THREE.TubeGeometry(rightChainCurve, 64, 0.012, 6, false), chainMat);
    necklace.add(rightChain);

    // Glow aura
    const auraGeo = new THREE.SphereGeometry(1.5, 32, 32);
    const auraMat = new THREE.MeshBasicMaterial({ color: 0xfde68a, transparent: true, opacity: 0, side: THREE.BackSide });
    giftAura = new THREE.Mesh(auraGeo, auraMat);

        });
        textGeo.center();
        const textMat = new THREE.MeshStandardMaterial({ 
            color: 0xfde68a, 
            metalness: 0.8, 
            roughness: 0.2,
            emissive: 0xfde68a,
            emissiveIntensity: 0.5
        });
        cake3DText = new THREE.Mesh(textGeo, textMat);
        cake3DText.position.set(0, 4.5, 0); 
        cake3DText.visible = false; // Hide initially
        cakeScene.add(cake3DText); 
    });

    window.addEventListener('resize', () => {
        if(appState === 3 && cakeCamera && cakeRenderer) {
            const container = document.getElementById('cake-container');
            if(!container) return;
            const w = container.clientWidth;
            const h = container.clientHeight;
            cakeCamera.aspect = w / h;
            cakeCamera.updateProjectionMatrix();
            cakeRenderer.setSize(w, h);
            if(cakeComposer) cakeComposer.setSize(w, h);
        }
    });

    animateCake3D();
}

function createFlameSprite() {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 30);
    grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
    grad.addColorStop(0.3, 'rgba(253, 230, 138, 0.8)');
    grad.addColorStop(0.7, 'rgba(249, 115, 22, 0.4)');
    grad.addColorStop(1, 'rgba(255, 0, 0, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 64, 64);

    const texture = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true, blending: THREE.AdditiveBlending }));
    sprite.scale.set(0.6, 0.8, 1);
    return sprite;
}

function animateCake3D() {
    if(appState !== 3) return;
    requestAnimationFrame(animateCake3D);
    
    const t = performance.now() * 0.001;

    // Auto rotation
    cakeGroup.rotation.y += 0.005;

    // Text float animation
    if(cake3DText) {
        cake3DText.position.y = 5.5 + Math.sin(t * 1.5) * 0.1;
        cake3DText.rotation.z = Math.sin(t * 0.8) * 0.05;
        cake3DText.rotation.y = Math.sin(t * 0.5) * 0.1;
    }

    // Gift/Necklace animations
    if(necklace && necklace.visible) {
        necklace.rotation.y += 0.01;
        necklace.position.y += Math.sin(t * 2) * 0.005;
        if(giftAura) giftAura.scale.setScalar(1 + Math.sin(t * 3) * 0.1);
        
        // Find and animate dancing diamonds
        necklace.traverse((child) => {
            if (child.userData && child.userData.isDancing) {
                child.rotation.x = Math.sin(t * 10) * 0.2;
                child.rotation.z = Math.cos(t * 8) * 0.2;
            }
        });
    }

    // Flicker flames
    candleFlames.forEach((f, i) => {
        if(f.visible) {
            const s = 1 + Math.sin(Date.now() * 0.01 + i) * 0.1;
            f.scale.set(0.6 * s, 0.8 * s, 1);
        }
    });

    if(cakeComposer) {
        cakeComposer.render();
    } else {
        cakeRenderer.render(cakeScene, cakeCamera);
    }
}

async function initAI() {
    document.getElementById('wcam').style.display='block';
    const vid = document.getElementById('v-raw');
    const hands = new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:1, modelComplexity:1, minDetectionConfidence:.6, minTrackingConfidence:.6});
    hands.onResults(onHandResults);
    const cam = new Camera(vid, {onFrame:async()=>await hands.send({image:vid}), width:160, height:120});

}

function onHandResults(results) {
    if(!results.multiHandLandmarks?.length) return;
    const lm = results.multiHandLandmarks[0];
    const tip = lm[8];

    // blow candles on screen 3
    if(appState===3 && cakeGroup) {
        const vel = Math.hypot(tip.x-lastX, tip.y-lastY);
        // Add parallax rotation based on hand position
        const tx = (tip.x - 0.5) * 2;
        const ty = -(tip.y - 0.5) * 0.5;
        gsap.to(cakeGroup.rotation, { y: tx, x: ty, duration: 0.8 });

        // Update sparkles to follow hand
        if(cakeSparkles) {
            const p = cakeSparkles.geometry.attributes.position.array;
            for(let i=0; i<30; i++) {
                p[i*3] = (tip.x - 0.5) * 8 + (Math.random()-0.5)*0.5;
                p[i*3+1] = -(tip.y - 0.5) * 6 + (Math.random()-0.5)*0.5;
                p[i*3+2] = (Math.random()-0.5)*0.5;
            }
            cakeSparkles.geometry.attributes.position.needsUpdate = true;
        }

        if(vel > 0.055 && blownCount < numCandles) {
            blowOne();
        }
    }

    // gallery control on screen 4
    if(appState===4 && g3dGroup) {
        const tx = (lm[0].x - .5) * 5;
        const ty = -(lm[0].y - .5) * 5;
        gsap.to(g3dGroup.rotation, {y:tx*.6, x:ty*.15, duration:1, overwrite:true});
        const pinch = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);
        gsap.to(g3dCamera.position, {z: pinch < 0.08 ? 3.5 : 6, duration:.8});
        gsap.to(g3dLight.position, {x:tx*2, y:ty*2, duration:.5});
    }

    lastX = tip.x; lastY = tip.y;
}

// ✏️ Edit these notes to personalize each photo!
const SLIDE_CAPTIONS = [

];
let slideIndex = 0;
let slideIsAnimating = false;

// Drag state
let dragStartX = 0, dragCurrentX = 0, dragStartTime = 0;
let isDragging = false;
let baseOffset = 0; // current pixel offset (negative = right)

window.toGallery = () => {
    switchScreen(3, 4);
    setTimeout(initSlideshow, 900);
};

function initSlideshow() {
    appState = 4;
    document.getElementById('lyrics-ui').style.opacity = '1';
    document.body.classList.add('on-gallery');



    const track = document.getElementById('slide-track');
    const dotsWrap = document.getElementById('slide-dots');
    track.innerHTML = '';
    dotsWrap.innerHTML = '';

    for (let i = 0; i < TOTAL_SLIDES; i++) {
        const item = document.createElement('div');
        item.className = 'slide-item';

        const card = document.createElement('div');
        card.className = 'polaroid-card' + (i === 0 ? ' active-card' : '');

        const photoDiv = document.createElement('div');
        photoDiv.className = 'polaroid-photo';
        photoDiv.addEventListener('click', () => openLightbox(i));

        const img = document.createElement('img');
        img.alt = `Memory ${i + 1}`;
        img.src = `./images/${i + 1}.jpg`;
        img.onerror = () => { photoDiv.textContent = '💖'; img.remove(); };
        photoDiv.appendChild(img);

        const label = document.createElement('div');
        label.className = 'polaroid-label';
        label.textContent = `Moment #${i + 1}`;

        const note = document.createElement('div');
        note.className = 'polaroid-note';
        note.textContent = SLIDE_CAPTIONS[i] || '';

        card.appendChild(photoDiv);
        card.appendChild(label);
        card.appendChild(note);
        item.appendChild(card);
        track.appendChild(item);

        // Dot
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goToSlide(i));
        dotsWrap.appendChild(dot);
    }

    goToSlide(0);

    // ─── DRAG / SWIPE (mouse + touch, live tracking) ───
    const onDragStart = (clientX) => {
        if (slideIsAnimating) return;
        isDragging = true;
        dragStartX = clientX;
        dragCurrentX = clientX;
        dragStartTime = Date.now();
        baseOffset = -slideIndex * track.offsetWidth;
        track.classList.add('dragging');
        gsap.killTweensOf(track); // stop any running animation
    };

    const onDragMove = (clientX) => {
        if (!isDragging) return;
        dragCurrentX = clientX;
        const delta = clientX - dragStartX;
        // Add resistance at boundaries
        let offset = baseOffset + delta;
        const maxOffset = 0;
        const minOffset = -(TOTAL_SLIDES - 1) * track.offsetWidth;
        if (offset > maxOffset) offset = maxOffset + (offset - maxOffset) * 0.25;
        if (offset < minOffset) offset = minOffset + (offset - minOffset) * 0.25;
        gsap.set(track, { x: offset });
        // Live card scale preview
        updateCardScales(offset);
    };

    const onDragEnd = (clientX) => {
        if (!isDragging) return;
        isDragging = false;
        track.classList.remove('dragging');
        const delta = clientX - dragStartX;
        const dt = Date.now() - dragStartTime;
        const velocity = delta / dt; // px/ms
        // Decide direction: flick velocity OR > 30% threshold
        const threshold = track.offsetWidth * 0.3;
        if (velocity < -0.3 || (delta < -threshold && velocity > -0.1)) {
            goToSlide(slideIndex + 1);
        } else if (velocity > 0.3 || (delta > threshold && velocity < 0.1)) {
            goToSlide(slideIndex - 1);
        } else {
            goToSlide(slideIndex); // snap back
        }
    };

    // Touch
    track.addEventListener('touchstart', e => onDragStart(e.touches[0].clientX), { passive: true });
    track.addEventListener('touchmove',  e => onDragMove(e.touches[0].clientX),  { passive: true });
    track.addEventListener('touchend',   e => onDragEnd(e.changedTouches[0].clientX), { passive: true });

    // Mouse
    track.addEventListener('mousedown', e => { e.preventDefault(); onDragStart(e.clientX); });
    window.addEventListener('mousemove', e => onDragMove(e.clientX));
    window.addEventListener('mouseup',   e => { if(isDragging) onDragEnd(e.clientX); });

    // Buttons
    document.getElementById('slide-prev').onclick = () => goToSlide(slideIndex - 1);
    document.getElementById('slide-next').onclick = () => goToSlide(slideIndex + 1);

    // Keyboard
    document.addEventListener('keydown', e => {
        if (appState !== 4) return;
        if (e.key === 'ArrowRight') goToSlide(slideIndex + 1);
        if (e.key === 'ArrowLeft')  goToSlide(slideIndex - 1);
    });

    goToSlide(0);
}

function updateCardScales(offset) {
    const W = document.getElementById('slide-track').offsetWidth;
    document.querySelectorAll('.polaroid-card').forEach((card, i) => {
        const cardOffset = offset + i * W; // how far this card is from center
        const dist = Math.abs(cardOffset) / W; // 0 = active, 1 = adjacent
        const scale = 1 - Math.min(dist, 1) * 0.12;
        const rotY = Math.sign(-cardOffset) * Math.min(dist, 1) * 5;
        gsap.set(card, { scale, rotationY: rotY, transformPerspective: 800 });
        card.classList.toggle('active-card', dist < 0.5);
    });
}

function goToSlide(idx) {
    idx = Math.max(0, Math.min(idx, TOTAL_SLIDES - 1));
    slideIndex = idx;
    const W = document.getElementById('slide-track').offsetWidth;
    const targetX = -slideIndex * W;

    slideIsAnimating = true;
    gsap.to('#slide-track', {
        x: targetX,
        duration: 0.55,
        ease: 'power3.out',
        onUpdate: function() {
            const cur = gsap.getProperty('#slide-track', 'x');
            updateCardScales(cur);
        },
        onComplete: () => { slideIsAnimating = false; }
    });

    document.getElementById('slide-counter').textContent = `${slideIndex + 1} / ${TOTAL_SLIDES}`;
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === slideIndex));
}

function nextSlide() { goToSlide(slideIndex + 1); }
function prevSlide() { goToSlide(slideIndex - 1); }

let lastLyric='';
function updateLyrics(){
    const t=document.getElementById('bg-music').currentTime;
    const line=LYRICS_DATA.findLast(l=>l.time<=t);
    if(!line||line.text===lastLyric)return;
    lastLyric=line.text;
    const ui=document.getElementById('lyrics-ui');
    gsap.to(ui,{opacity:0,y:5,duration:.3,onComplete:()=>{
        ui.textContent=line.text;
        gsap.to(ui,{opacity:1,y:0,duration:.5,ease:'power2.out'});
    }});
}

// ════════════════════════════════════════
//  SCREEN SWITCH
// ════════════════════════════════════════
function switchScreen(from, to){
    const el=document.getElementById(`s${from}`);
    const overlay = document.getElementById('transition-overlay');
    overlay.classList.add('active');
    
    el.classList.remove('active');

    // Cleanup Screen 1 Three.js if moving away
    if(from === 1 && s1Renderer) {
        setTimeout(() => {
            s1Renderer.dispose();
            s1Scene.traverse(obj => {
                if(obj.geometry) obj.geometry.dispose();
                if(obj.material) {
                    if(Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                    else obj.material.dispose();
                }
            });
        }, 1000);
    }

    setTimeout(()=>{
        const next=document.getElementById(`s${to}`);
        next.classList.add('active');
        appState=to;
        setTimeout(() => overlay.classList.remove('active'), 400);
    }, 900);
}


initApp();

// ════════════════════════════════════════
//  LIGHTBOX
// ════════════════════════════════════════
let lbIndex = 0;

function openLightbox(idx) {
    lbIndex = Math.max(0, Math.min(idx, TOTAL_SLIDES - 1));
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lb-img');
    const cap = document.getElementById('lb-caption');
    const ctr = document.getElementById('lb-counter');
    img.src = `./images/${lbIndex + 1}.jpg`;
    cap.textContent = SLIDE_CAPTIONS[lbIndex] || '';
    ctr.textContent = `${lbIndex + 1} / ${TOTAL_SLIDES}`;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    const lb = document.getElementById('lightbox');
    lb.classList.remove('open');
    document.body.style.overflow = '';
    // brief delay then clear src so no flicker on reopen
    setTimeout(() => { document.getElementById('lb-img').src = ''; }, 300);
}

function lbNav(dir) {
    lbIndex = (lbIndex + dir + TOTAL_SLIDES) % TOTAL_SLIDES;
    const img = document.getElementById('lb-img');
    const cap = document.getElementById('lb-caption');
    const ctr = document.getElementById('lb-counter');
    gsap.to(img, { opacity: 0, x: dir * -30, duration: 0.18, onComplete: () => {
        img.src = `./images/${lbIndex + 1}.jpg`;
        cap.textContent = SLIDE_CAPTIONS[lbIndex] || '';
        ctr.textContent = `${lbIndex + 1} / ${TOTAL_SLIDES}`;
        gsap.fromTo(img, { opacity: 0, x: dir * 30 }, { opacity: 1, x: 0, duration: 0.22 });
    }});
}

// Wire lightbox buttons
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => lbNav(-1));
document.getElementById('lb-next').addEventListener('click', () => lbNav(1));

// Close on backdrop click
document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// Keyboard: Escape = close, arrows = navigate
document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft')  lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
});

// Touch swipe in lightbox
let lbTouchX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
    lbTouchX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('lightbox').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - lbTouchX;
    if (dx < -40) lbNav(1);
    else if (dx > 40) lbNav(-1);
}, { passive: true });

// ════════════════════════════════════════
//  APP FULLSCREEN TOGGLE
// ════════════════════════════════════════
const btnFS = document.getElementById('btn-fullscreen');
const fsExpand   = document.getElementById('fs-icon-expand');
const fsCompress = document.getElementById('fs-icon-compress');
const fsLabel    = document.getElementById('fs-label');

btnFS.addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
});

document.addEventListener('fullscreenchange', () => {
    const isFS = !!document.fullscreenElement;
    fsExpand.style.display   = isFS ? 'none'  : 'block';
    fsCompress.style.display = isFS ? 'block' : 'none';
    fsLabel.textContent      = isFS ? 'EXIT'  : 'FULLSCREEN';
});
</script>
